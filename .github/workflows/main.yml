name: CI Farmacia
on:
  push:
    branches: [ "master", "main", "01_Configurando_Projeto", "02_CRUD_Categoria" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
